mutation OpprettNyOppgave(
    $eksternId: String!
    $lenke: String!,
    $tekst: String!,
    $virksomhetsnummer: String!,
    $merkelapp: String!,
    $tidspunkt: ISO8601DateTime,
    $grupperingsid: String,
    $ressursId: String!,
    $varslingTittel: String!,
    $varslingInnhold: String!,
    $paaminnelseInput: PaaminnelseInput
){
    nyOppgave(nyOppgave: {
        mottakere: [
            {
                altinnRessurs: {
                    ressursId: $ressursId
                }
            }
        ],
        notifikasjon: {
            lenke: $lenke,
            tekst: $tekst,
            merkelapp: $merkelapp
        },
        metadata: {
            virksomhetsnummer: $virksomhetsnummer,
            eksternId: $eksternId,
            opprettetTidspunkt: $tidspunkt,
            grupperingsid: $grupperingsid,
        },
        eksterneVarsler: [
            {
                altinnressurs: {
                    mottaker: {
                        ressursId: $ressursId
                    },
                    epostTittel: $varslingTittel,
                    epostHtmlBody: $varslingInnhold,
                    smsTekst: $varslingInnhold,
                    sendetidspunkt: {
                        sendevindu: NKS_AAPNINGSTID
                    },
                }
            }
        ],
        paaminnelse: $paaminnelseInput
    }) {
        __typename
        ... on NyOppgaveVellykket {
            id
        }
        ... on UgyldigMerkelapp {
            feilmelding
        }
        ... on UgyldigMottaker {
            feilmelding
        }
        ... on DuplikatEksternIdOgMerkelapp {
            feilmelding
            idTilEksisterende
        }
        ... on UkjentProdusent {
            feilmelding
        }
        ... on UkjentRolle {
            feilmelding
        }
        ... on UgyldigPaaminnelseTidspunkt {
            feilmelding
        }
    }
}
