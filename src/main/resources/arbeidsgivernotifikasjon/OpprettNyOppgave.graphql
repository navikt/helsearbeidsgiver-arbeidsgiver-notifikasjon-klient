mutation OpprettNyOppgave(
    $eksternId: String!
    $lenke: String!,
    $tekst: String!,
    $virksomhetsnummer: String!,
    $merkelapp: String!,
    $tidspunkt: ISO8601DateTime,
    $grupperingsid: String,
    $mottaker: MottakerInput!,
    $eksterneVarsler: [EksterntVarselInput!]!,
    $paaminnelseInput: PaaminnelseInput
){
    nyOppgave(nyOppgave: {
        mottakere: [$mottaker],
        notifikasjon: {
            lenke: $lenke,
            tekst: $tekst,
            merkelapp: $merkelapp
        },
        metadata: {
            virksomhetsnummer: $virksomhetsnummer,
            eksternId: $eksternId,
            opprettetTidspunkt: $tidspunkt,
            grupperingsid: $grupperingsid,
        },
        eksterneVarsler: $eksterneVarsler,
        paaminnelse: $paaminnelseInput
    }) {
        __typename
        ... on NyOppgaveVellykket {
            id
        }
        ... on UgyldigMerkelapp {
            feilmelding
        }
        ... on UgyldigMottaker {
            feilmelding
        }
        ... on DuplikatEksternIdOgMerkelapp {
            feilmelding
            idTilEksisterende
        }
        ... on UkjentProdusent {
            feilmelding
        }
        ... on UkjentRolle {
            feilmelding
        }
        ... on UgyldigPaaminnelseTidspunkt {
            feilmelding
        }
    }
}
